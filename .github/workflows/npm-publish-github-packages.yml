# This workflow will run tests using node and then publish a package to GitHub Packages when a release is created
# For more information see: https://docs.github.com/en/actions/publishing-packages/publishing-nodejs-packages

name: Node.js CI and Package Publish

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci || npm install
      - run: npm run test:ci
      - run: npm run build

  publish-gpr:
    if: github.event_name == 'release'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com
      - name: Install dependencies
        run: npm ci || npm install
      - name: Check package publishability
        id: package_check
        run: |
          node -e "const fs=require('fs'); const pkg=JSON.parse(fs.readFileSync('package.json','utf8')); let publishable=true; let reason='ok'; if(pkg.private){ publishable=false; reason='package.json has private=true'; } if(!pkg.private && !/^@[^/]+\/.+/.test(pkg.name||'')){ publishable=false; reason='package name must be scoped (e.g. @owner/name) for GitHub Packages'; } fs.appendFileSync(process.env.GITHUB_OUTPUT, `publishable=${publishable}\nreason=${reason}\n`);"
      - name: Publish package
        if: steps.package_check.outputs.publishable == 'true'
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{secrets.GITHUB_TOKEN}}
      - name: Skip publish reason
        if: steps.package_check.outputs.publishable != 'true'
        run: |
          echo "Skipping npm publish: ${{ steps.package_check.outputs.reason }}"
